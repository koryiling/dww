# Netlify build & runtime configuration.

[build]
  # Static site: the contents of public/ are served directly at the root,
  # exactly as Cloudflare's `assets.directory` did.
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  # Match the Worker's modern runtime; Web Crypto globals (crypto.subtle,
  # crypto.getRandomValues) that auth.js/wheel.js rely on exist here.
  NODE_VERSION = "20"

[functions]
  # esbuild bundles the function together with its imports (src/, db/) and the
  # `postgres` dependency.
  node_bundler = "esbuild"

# NOTE: /api/* routing is handled by `export const config = { path: "/api/*" }`
# inside netlify/functions/api.mjs — no redirect rule is needed here.
