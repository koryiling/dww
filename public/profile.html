<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>我的资料 Profile — 大胃王</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app admin-app" id="screen" hidden>
  <div class="topbar">
    <a class="icon-btn wide" href="index.html">← <span data-i18n="backToGame">返回游戏</span></a>
    <div class="topbar-group">
      <button class="icon-btn wide" id="lang" data-i18n="language">English</button>
      <button class="icon-btn wide" id="logout" data-i18n="logout">登出</button>
    </div>
  </div>

  <header class="hero">
    <h1 id="profile-avatar" style="font-size:3rem;margin:0">🐰</h1>
    <h2 id="profile-name" style="margin:.2rem 0 0">—</h2>
    <p class="subtitle">ID <strong id="profile-id">—</strong></p>
  </header>

  <!-- Bio (read-only view of anyone) -->
  <section class="card" id="bio-view" hidden>
    <h2 class="admin-h2">📝 <span data-i18n="aboutMe">个人简介</span></h2>
    <p id="bio-text" class="bio-box"></p>
  </section>

  <!-- Edit (own profile only) -->
  <section class="card" id="edit-card">
    <h2 class="admin-h2">✏️ <span data-i18n="edit">编辑资料</span></h2>
    <form id="profile-form" class="form">
      <label class="field">
        <span data-i18n="username">用户名</span>
        <input id="edit-name" type="text" maxlength="16">
      </label>
      <div class="field">
        <span data-i18n="avatar">头像</span>
        <div id="edit-avatars" class="avatar-grid"></div>
      </div>
      <div class="field">
        <span data-i18n="favColor">喜欢的颜色</span>
        <div id="edit-swatches" class="swatches"></div>
      </div>
      <label class="field">
        <span data-i18n="aboutMe">个人简介</span>
        <textarea id="edit-bio" maxlength="200" rows="3" class="bio-input"
                  data-i18n-ph="bioPlaceholder" placeholder="写点关于你的话…"></textarea>
      </label>
      <label class="field">
        <span data-i18n="birthday">生日</span>
        <input id="edit-birthday" type="date">
      </label>
      <p id="profile-error" class="error" hidden></p>
      <button type="submit" class="wide-btn" data-i18n="save">保存</button>
    </form>
  </section>

  <!-- My stats (own profile only) -->
  <section class="card" id="stats-card">
    <h2 class="admin-h2">📊 <span data-i18n="dashboard">我的数据</span></h2>
    <div class="stat-tiles">
      <div class="stat-tile"><span data-i18n="totalSpend">总下注</span><strong id="st-spend">0</strong></div>
      <div class="stat-tile"><span data-i18n="totalIncome">总收入</span><strong id="st-income">0</strong></div>
      <div class="stat-tile"><span data-i18n="netProfit">净盈亏</span><strong id="st-net">0</strong></div>
      <div class="stat-tile"><span data-i18n="totalTopup">总充值</span><strong id="st-topup">0</strong></div>
    </div>
  </section>

  <!-- Gifts received (max 6, then view more) -->
  <section class="card">
    <div class="lb-head">
      <h2 class="admin-h2">🎁 <span data-i18n="giftsReceived">收到的礼物</span></h2>
      <a class="lb-tab" id="gifts-more" href="#" hidden data-i18n="viewMore">查看更多</a>
    </div>
    <div id="recv-gifts" class="recv-gifts"></div>
  </section>

  <p id="toast" class="toast" hidden></p>
</div>

<script src="profile.js" type="module"></script>
</body>
</html>
