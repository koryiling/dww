<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>大胃王 (replica)</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ===================== Login / Register / Reset ===================== -->
<div id="auth-screen" class="app auth">
  <div class="topbar end">
    <button class="icon-btn wide" id="lang-auth" data-i18n="language">English</button>
  </div>

  <header class="hero">
    <h1>大胃王 <span class="replica">(replica)</span></h1>
    <p class="subtitle" data-i18n="subtitle">– 多人同步 –</p>
  </header>

  <section class="card">
    <div class="tabs" role="tablist">
      <button class="tab active" id="tab-login" role="tab" data-i18n="login">登入</button>
      <button class="tab" id="tab-register" role="tab" data-i18n="register">注册</button>
      <button class="tab" id="tab-reset" role="tab" data-i18n="reset">重设密码</button>
    </div>

    <form id="auth-form" class="form" autocomplete="off">
      <label class="field">
        <span id="label-username" data-i18n="username">用户名</span>
        <input id="username" name="username" type="text" maxlength="16" required>
      </label>

      <label class="field">
        <span id="label-password" data-i18n="password">密码</span>
        <input id="password" name="password" type="password" minlength="4" required>
      </label>

      <div class="field" id="color-field" hidden>
        <span data-i18n="favColor">喜欢的颜色</span>
        <div id="swatches" class="swatches"></div>
      </div>

      <p id="reset-help" class="hint" data-i18n="forgotHelp" hidden></p>
      <p id="auth-error" class="error" hidden></p>

      <button type="submit" id="auth-submit" class="wide-btn" data-i18n="submitLogin">登入</button>
    </form>

    <p class="hint" data-i18n="authHint"></p>
  </section>
</div>

<!-- ===================== Game ===================== -->
<div id="game-screen" class="app wide" hidden>

  <div class="topbar">
    <div class="topbar-group">
      <!-- Superadmin only; revealed once /api/state confirms the flag. -->
      <a class="icon-btn wide admin-link" id="admin-link" href="admin.html" hidden>
        ⚙ <span data-i18n="adminPage">管理后台</span>
      </a>
    </div>
    <div class="topbar-group">
      <button class="icon-btn wide side-toggle" id="side-toggle">
        🏆 <span data-i18n="panel">面板</span>
      </button>
      <button class="icon-btn wide" id="lang-game" data-i18n="language">English</button>
    </div>
  </div>

  <header class="hero">
    <h1>大胃王 <span class="replica">(replica)</span></h1>
    <p class="subtitle" data-i18n="subtitle">– 多人同步 –</p>
  </header>

  <div class="layout">

    <!-- ---------- main column ---------- -->
    <div class="main-col">

      <section class="status-card">
        <div class="polaroid">
          <div class="polaroid-photo">🐰🐻</div>
          <span class="polaroid-caption">Yi &amp; Bu ♡</span>
        </div>

        <dl class="stats">
          <div class="stat">
            <dt><span class="stat-icon">🕐</span> <span data-i18n="timeLeft">剩余时间：</span></dt>
            <dd><span id="timer" class="pill">--</span> <span data-i18n="seconds">秒</span></dd>
          </div>
          <div class="stat">
            <dt><span class="stat-icon coin">🪙</span> <span data-i18n="coinsLabel">金币：</span></dt>
            <dd><span id="balance" class="pill">0</span></dd>
          </div>
          <div class="stat">
            <dt><span class="stat-icon">👥</span> <span data-i18n="playersIn">本轮参与：</span></dt>
            <dd><span id="bettors" class="pill">0</span> <span data-i18n="peopleUnit">人</span></dd>
          </div>
        </dl>
      </section>

      <section id="chips" class="chip-row" aria-label="chips"></section>

      <section id="board" class="board" aria-label="board"></section>

      <a id="request-topup" class="wide-btn subtle" href="buy.html">
        <span class="wide-btn-icon">💰</span> <span data-i18n="requestTopup">申请充值</span>
      </a>
      <p id="request-status" class="hint" hidden></p>

      <button id="view-records" class="wide-btn">
        <span class="wide-btn-icon">📋</span> <span data-i18n="myRecords">我的记录</span>
      </button>

      <section class="round-status">
        <p id="phase-text" class="phase-text" data-i18n="connecting">连接中…</p>
        <div class="divider"></div>
        <button id="past-results" class="wide-btn subtle">
          <span class="wide-btn-icon">📊</span> <span data-i18n="pastResults">历史开奖</span>
        </button>
      </section>
    </div>

    <!-- ---------- side column ---------- -->
    <aside class="side-col" id="sidebar">

      <!-- Profile — click the header to expand -->
      <section class="card profile collapsed" id="profile">
        <div class="profile-head" id="profile-head">
          <span class="profile-dot" id="player-dot"></span>
          <div class="profile-who">
            <p class="profile-name" id="player-name">—</p>
            <p class="profile-id">ID <strong id="player-id">—</strong></p>
          </div>
          <button class="icon-btn" id="refresh" data-i18n-title="refresh" aria-label="refresh">⟳</button>
          <span class="profile-caret" id="profile-caret">▾</span>
        </div>

        <div class="profile-body">
          <p class="profile-row">
            <span data-i18n="birthday">生日</span>
            <strong id="player-birthday">—</strong>
          </p>

          <div class="profile-actions">
            <button class="lb-tab active" id="edit-profile" data-i18n="edit">编辑资料</button>
            <button class="lb-tab" id="logout" data-i18n="logout">登出</button>
          </div>

          <form id="profile-form" class="form" hidden>
          <label class="field">
            <span data-i18n="username">用户名</span>
            <input id="edit-name" type="text" maxlength="16">
          </label>
          <label class="field">
            <span data-i18n="birthday">生日</span>
            <input id="edit-birthday" type="date">
          </label>
          <div class="field">
            <span data-i18n="favColor">喜欢的颜色</span>
            <div id="edit-swatches" class="swatches"></div>
          </div>
          <p id="profile-error" class="error" hidden></p>
          <div class="button-row">
            <button type="button" class="wide-btn subtle" id="cancel-edit" data-i18n="cancel">取消</button>
            <button type="submit" class="wide-btn" data-i18n="save">保存</button>
          </div>
          </form>
        </div>
      </section>

      <!-- Personal dashboard -->
      <section class="card">
        <h2 class="admin-h2">📊 <span data-i18n="dashboard">我的数据</span></h2>
        <div class="stat-tiles">
          <div class="stat-tile">
            <span data-i18n="totalSpend">总下注</span>
            <strong id="st-spend">0</strong>
          </div>
          <div class="stat-tile">
            <span data-i18n="totalIncome">总收入</span>
            <strong id="st-income">0</strong>
          </div>
          <div class="stat-tile">
            <span data-i18n="netProfit">净盈亏</span>
            <strong id="st-net">0</strong>
          </div>
          <div class="stat-tile">
            <span data-i18n="totalTopup">总充值</span>
            <strong id="st-topup">0</strong>
          </div>
        </div>
        <p class="stat-line" id="st-rounds">—</p>
        <div class="record-buttons">
          <button class="lb-tab" data-records="game" data-i18n="gameRecords">游戏记录</button>
          <button class="lb-tab" data-records="win" data-i18n="winRecords">赢的记录</button>
          <button class="lb-tab" data-records="lose" data-i18n="loseRecords">输的记录</button>
          <button class="lb-tab" data-records="topup" data-i18n="topupRecords">充值记录</button>
        </div>
      </section>

      <!-- This round's top 3 -->
      <section class="card">
        <h2 class="admin-h2">🏆 <span data-i18n="top3">本局前三名</span></h2>
        <div id="podium" class="podium"></div>
      </section>

      <!-- Leaderboard -->
      <section class="card leaderboard">
        <div class="lb-head">
          <h2 class="admin-h2"><span data-i18n="leaderboard">排行榜</span></h2>
          <div class="lb-tabs" id="lb-tabs">
            <button class="lb-tab active" data-range="day" data-i18n="daily">今日</button>
            <button class="lb-tab" data-range="week" data-i18n="weekly">本周</button>
            <button class="lb-tab" data-range="month" data-i18n="monthly">本月</button>
          </div>
        </div>
        <ol id="lb-list" class="lb-list"></ol>
      </section>
    </aside>
  </div>

  <p id="toast" class="toast" hidden></p>
</div>

<!-- ===================== Records overlay ===================== -->
<div id="panel" class="panel" hidden>
  <div class="panel-inner">
    <h2 id="panel-title">Records</h2>
    <ul id="panel-list" class="panel-list"></ul>
    <button id="panel-close" class="wide-btn" data-i18n="close">关闭</button>
  </div>
</div>

<script src="app.js" type="module"></script>
</body>
</html>
