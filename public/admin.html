<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>管理后台 Admin — 大胃王</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="login-screen" class="app auth">
  <header class="hero">
    <h1>管理后台</h1>
    <p class="subtitle">Superadmin</p>
  </header>
  <section class="card">
    <form id="login-form" class="form" autocomplete="off">
      <label class="field">
        <span>用户名 Username</span>
        <input id="admin-user" type="text" required>
      </label>
      <label class="field">
        <span>密码 Password</span>
        <input id="admin-pass" type="password" required>
      </label>
      <p id="login-error" class="error" hidden></p>
      <button type="submit" class="wide-btn">登入 Login</button>
    </form>
  </section>
</div>

<div id="admin-screen" class="app" hidden>
  <div class="corner-actions left">
    <a class="icon-btn wide" href="index.html">← 游戏 Game</a>
  </div>
  <div class="corner-actions">
    <button class="icon-btn wide" id="logout">登出</button>
  </div>

  <header class="hero">
    <h1>管理后台</h1>
    <p class="subtitle">审批 · 充值 · 密码 · 记录</p>
  </header>

  <!-- Approvals -->
  <section class="card">
    <div class="lb-head">
      <h2 class="admin-h2">
        ✅ 充值审批 / Top-up approval
        <span class="panel-tag" id="pending-count">0</span>
      </h2>
      <button id="refresh-pending" class="lb-tab active">刷新</button>
    </div>
    <ul id="pending-list" class="panel-list"></ul>
  </section>

  <!-- Actions -->
  <a class="wide-btn" href="topup.html" style="text-decoration:none">
    <span class="wide-btn-icon">💰</span> 手动充值 / Manual top-up
  </a>

  <a class="wide-btn subtle" href="reset.html" style="text-decoration:none">
    <span class="wide-btn-icon">🔑</span> 清除密码 / Clear password
  </a>

  <!-- Who received the most -->
  <section class="card">
    <div class="lb-head">
      <h2 class="admin-h2">🏆 充值排行 / Top-up ranking</h2>
      <div class="lb-tabs" id="stat-tabs">
        <button class="lb-tab active" data-range="today">今日 Today</button>
        <button class="lb-tab" data-range="allTime">总计 All time</button>
      </div>
    </div>
    <ol id="stat-list" class="lb-list"></ol>
  </section>

  <!-- Audit trail -->
  <section class="card">
    <div class="lb-head">
      <h2 class="admin-h2">📜 操作记录 / History</h2>
      <div class="lb-tabs" id="audit-tabs">
        <button class="lb-tab active" data-action="">全部</button>
        <button class="lb-tab" data-action="topup_approve">审批</button>
        <button class="lb-tab" data-action="topup_manual">手动</button>
        <button class="lb-tab" data-action="clear_password">密码</button>
      </div>
    </div>
    <ul id="audit-list" class="panel-list"></ul>
  </section>

  <!-- Players -->
  <section class="card">
    <div class="lb-head">
      <h2 class="admin-h2">👥 玩家 / Players</h2>
      <button id="refresh-users" class="lb-tab active">刷新</button>
    </div>
    <ul id="user-list" class="panel-list"></ul>
  </section>

  <p id="toast" class="toast" hidden></p>
</div>

<script src="admin.js" type="module"></script>
</body>
</html>
